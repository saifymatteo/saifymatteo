name: flutter_web
description: A portfolio website created using Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.19.6 <3.0.0'

dependency_overrides:
  components:
    path: ../../Flutter-Components/packages/components

dependencies:
  auto_route: ^6.0.5
  components:
    git:
      url: https://github.com/saifymatteo/Flutter-Components.git
      path: packages/components
  debouncer:
    git:
      url: https://github.com/saifymatteo/Flutter-Components.git
      path: packages/debouncer
  extensions:
    git:
      url: https://github.com/saifymatteo/Flutter-Components.git
      path: packages/extensions
  flutter:
    sdk: flutter
  flutter_hooks: ^0.18.6
  flutter_riverpod: ^2.3.4
  freezed_annotation: ^2.2.0
  get_it: ^7.2.0
  hooks_riverpod: ^2.3.4
  log:
    git:
      url: https://github.com/saifymatteo/Flutter-Components.git
      path: packages/log
  rxdart: ^0.27.7
  ui_constants:
    git:
      url: https://github.com/saifymatteo/Flutter-Components.git
      path: packages/ui_constants

dev_dependencies:
  auto_route_generator: ^6.0.3
  build_runner: ^2.3.3
  flutter_test:
    sdk: flutter
  freezed: ^2.3.2
  very_good_analysis: ^4.0.0+1

flutter:
  uses-material-design: true
